<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>パ◯ンコ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    touch-action: none;
  }
  #gameContainer {
    position: relative;
    width: 390px;
    height: 700px;
    overflow: hidden;
    background: #000;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
  }
  #uiCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }
  #controls {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 15px;
    pointer-events: auto;
  }
  .dpad {
    display: grid;
    grid-template-columns: 44px 44px 44px;
    grid-template-rows: 44px 44px 44px;
    gap: 3px;
  }
  .btn {
    background: rgba(255,100,150,0.8);
    border: 3px solid #ff69b4;
    border-radius: 8px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: 0 4px 0 rgba(180,0,80,0.8);
    active-background: rgba(255,50,100,0.9);
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(180,0,80,0.8); }
  .btn-empty { background: transparent; border: none; box-shadow: none; pointer-events: none; }
  .action-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .action-btn {
    background: rgba(255,200,50,0.85);
    border: 3px solid #ffd700;
    border-radius: 50%;
    width: 52px; height: 52px;
    color: #000;
    font-size: 9px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 0 rgba(180,120,0,0.8);
    text-align: center;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 100;
  }
  .screen { display: none; width: 100%; height: 100%; position: absolute; top:0; left:0; flex-direction: column; align-items: center; justify-content: center; }
  .screen.active { display: flex; }
  #pixel-font {
    font-family: monospace;
    image-rendering: pixelated;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="390" height="700"></canvas>
  <canvas id="uiCanvas" width="390" height="700"></canvas>

  <!-- Controls (shown only during gameplay) -->

  <div id="controls" style="display:none;">
    <div class="dpad">
      <div class="btn-empty"></div>
      <div class="btn" id="btnUp">▲</div>
      <div class="btn-empty"></div>
      <div class="btn" id="btnLeft">◀</div>
      <div class="btn-empty"></div>
      <div class="btn" id="btnRight">▶</div>
      <div class="btn-empty"></div>
      <div class="btn" id="btnDown">▼</div>
      <div class="btn-empty"></div>
    </div>
    <div class="action-btns">
      <div class="action-btn" id="btnAction" style="background:rgba(100,200,255,0.85);border-color:#00bfff;">台<br>へ</div>
    </div>
  </div>

  <!-- Overlay screens -->

  <div id="overlay">
    <!-- Title Screen -->
    <div id="screenTitle" class="screen active"></div>
    <!-- Instructions Screen -->
    <div id="screenInstructions" class="screen"></div>
    <!-- Opening Screen -->
    <div id="screenOpening" class="screen"></div>
    <!-- Game Over Screen -->
    <div id="screenGameOver" class="screen"></div>
    <!-- Clear Screen -->
    <div id="screenClear" class="screen"></div>
    <!-- True End Screen -->
    <div id="screenTrueEnd" class="screen"></div>
    <!-- True End Gal Game -->
    <div id="screenGalGame" class="screen"></div>
    <!-- Bad True End -->
    <div id="screenBadTrueEnd" class="screen"></div>
    <!-- Time Up Screen -->
    <div id="screenTimeUp" class="screen"></div>
  </div>
</div>

// ============================================================

// ============================================================
// GAME STATE
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiCanvas = document.getElementById('uiCanvas');
const uiCtx = uiCanvas.getContext('2d');

const W = 390, H = 700;

// Game zones
const MACHINE_AREA_TOP = 120; // top of pachinko machines row
const MACHINE_AREA_H = 100;
const FLOOR_TOP = MACHINE_AREA_TOP + MACHINE_AREA_H; // ~220
const PLAY_BOTTOM = H - 160; // above controls
const NUM_LANES = 5;
const LANE_W = W / NUM_LANES; // 78px each
const LANE_CENTERS = Array.from({length:NUM_LANES}, (_,i) => Math.floor(LANE_W*i + LANE_W/2));

// Machine x positions match lanes
const MACHINE_W = 64, MACHINE_H = 80;

// Hero constants
const HERO_W = 48, HERO_H = 64;
const HERO_SPEED = 3;

// Clerk constants
const CLERK_W = 48, CLERK_H = 64;
const CLERK_BASE_SPEED = 1.8;

const spriteSheet = new Image();
spriteSheet.src = 'sprites.png';

let gameState = 'title'; // title, opening, playing, gameover, clear, trueend, galGame, badTrueEnd, timeup, instructions
let difficulty = 'low'; // 'low'=1/199, 'high'=1/60
let bigwinChance = 199;

// Game data
let hero = {
  x: LANE_CENTERS[2],
  y: PLAY_BOTTOM - HERO_H - 60,
  lane: 2,
  balls: 0,
  maxBalls: 20,
  facing: 'front', // front / back
  moving: false,
  frame: 0,
  frameTimer: 0,
  atMachine: false, // is standing at machine
  targetMachine: -1,
};

let machines = Array.from({length:5}, (_,i) => ({
  x: LANE_CENTERS[i] - MACHINE_W/2,
  y: MACHINE_AREA_TOP,
  bigWin: false,
  frame: 0,
  frameTimer: 0,
  spinning: false,
}));

let balls = []; // floor balls
let ballSpawnTimer = 0;

let clerks = [];
let clerkSpawnTimer = 0;
let clerkSpawnInterval = 300; // frames

let keys = { up:false, down:false, left:false, right:false };
let moveTimer = 0;
const MOVE_DELAY = 12;

// Timer
let gameTimer = 10 * 60 * 60; // 10 min in frames (60fps)
const TOTAL_FRAMES = 10 * 60 * 60;
const CLOSE_TIME_H = 22, CLOSE_TIME_M = 45;
const START_TIME_H = 10, START_TIME_M = 0;

let bigWinCount = 0;
let slotActive = false;
let slotTimer = 0;
let slotInterval = 4; // frames between ball consumption

// Gal game state
let galStage = 0;
let galChoices = [];
let galResult = false; // true = true end
const GAL_SCRIPT = [
  {
    text: "パチンコ玉拾って…\nあなたのために\n沢山稼いだの…\nだから、わたしと…",
    choices: [

    ]
  },
  {

    choices: [
      { text: "大切な人だよ", score: 3 },
      { text: "友達以上かも", score: 2 },
      { text: "一番好きな人", score: 3 },
      { text: "よく分からない", score: -1 },
      { text: "ただの友達だよ", score: -3 },
    ]
  },
  {
    text: "デートしてくれる…？\n一緒に歩きたいな",
    choices: [
      { text: "もちろん！", score: 3 },
      { text: "どこ行きたい？", score: 2 },
      { text: "いつでも行くよ", score: 2 },

      { text: "考えておくね", score: -1 },
    ]
  },
  {
    text: "ずっと一緒に\nいてくれる…？",
    choices: [
      { text: "永遠に一緒にいるよ", score: 3 },
      { text: "約束する", score: 3 },
      { text: "できる限り", score: 1 },
      { text: "約束はできない", score: -2 },
      { text: "…", score: -1 },
    ]
  },
  {
    text: "付き合ってください！",
    choices: [
      { text: "はい！喜んで！", score: 3 },
      { text: "こちらこそ！", score: 3 },
      { text: "よろしくね", score: 2 },
      { text: "ちょっと待って", score: -3 },
      { text: "ごめんなさい", score: -3 },
    ]
  },
];
let galTotalScore = 0;
let galCurrentStage = 0;

// Particle system
let particles = [];

// Animation frames
let frameCount = 0;

// ============================================================
// SPRITE DRAWING
// ============================================================
function drawSprite(frames, frameIdx, dx, dy, dw, dh, flipH) {
  if (!spriteSheet.complete) return;
  const sp = Array.isArray(frames) ? frames[frameIdx % frames.length] : frames;
  if (!sp) return;
  ctx.save();
  if (flipH) {
    ctx.translate(dx + dw, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(spriteSheet, sp.x, sp.y, sp.w, sp.h, 0, 0, dw, dh);
  } else {
    ctx.drawImage(spriteSheet, sp.x, sp.y, sp.w, sp.h, dx, dy, dw, dh);
  }
  ctx.restore();
}

function drawSpriteUI(ctx2, frames, frameIdx, dx, dy, dw, dh, flipH) {
  if (!spriteSheet.complete) return;
  const sp = Array.isArray(frames) ? frames[frameIdx % frames.length] : frames;
  if (!sp) return;
  ctx2.save();
  if (flipH) {
    ctx2.translate(dx + dw, dy);
    ctx2.scale(-1, 1);
    ctx2.drawImage(spriteSheet, sp.x, sp.y, sp.w, sp.h, 0, 0, dw, dh);
  } else {
    ctx2.drawImage(spriteSheet, sp.x, sp.y, sp.w, sp.h, dx, dy, dw, dh);
  }
  ctx2.restore();
}

// ============================================================
// BACKGROUND DRAWING
// ============================================================
function drawBackground() {
  // Ceiling / wall
  ctx.fillStyle = '#1a0a1f';
  ctx.fillRect(0, 0, W, MACHINE_AREA_TOP);

  // Machines area backdrop
  ctx.fillStyle = '#120818';
  ctx.fillRect(0, MACHINE_AREA_TOP - 10, W, MACHINE_AREA_H + 30);

  // Floor area
  const floorGrad = ctx.createLinearGradient(0, FLOOR_TOP, 0, PLAY_BOTTOM);
  floorGrad.addColorStop(0, '#2a0a2a');
  floorGrad.addColorStop(1, '#1a0518');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, FLOOR_TOP, W, PLAY_BOTTOM - FLOOR_TOP);

  // Floor tiles (dark checker)
  for (let tx = 0; tx < W; tx += 26) {
    for (let ty = FLOOR_TOP; ty < PLAY_BOTTOM; ty += 26) {
      const even = ((Math.floor(tx/26) + Math.floor((ty-FLOOR_TOP)/26)) % 2 === 0);
      ctx.fillStyle = even ? 'rgba(80,0,80,0.25)' : 'rgba(120,0,120,0.15)';
      ctx.fillRect(tx, ty, 26, 26);
    }
  }

  // Lane dividers
  ctx.strokeStyle = 'rgba(255,100,200,0.15)';
  ctx.lineWidth = 1;
  for (let i = 1; i < NUM_LANES; i++) {
    ctx.beginPath();
    ctx.moveTo(LANE_W * i, MACHINE_AREA_TOP);
    ctx.lineTo(LANE_W * i, PLAY_BOTTOM);
    ctx.stroke();
  }

  // Neon side pillars (drawn inline since sprite may not align perfectly)
  const pillarColors = ['#ff69b4','#cc00ff'];
  for (let side = 0; side < 2; side++) {
    const px = side === 0 ? 2 : W - 20;
    const grad = ctx.createLinearGradient(px, 0, px + 18, 0);
    grad.addColorStop(0, pillarColors[side % 2]);
    grad.addColorStop(0.5, 'white');
    grad.addColorStop(1, pillarColors[(side+1) % 2]);
    ctx.fillStyle = grad;
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(frameCount * 0.05 + side);
    ctx.fillRect(px, MACHINE_AREA_TOP - 10, 18, H - MACHINE_AREA_TOP + 10);
    ctx.globalAlpha = 1;
  }

  // Sign banners at top
  ctx.fillStyle = '#ff1493';
  ctx.font = 'bold 11px DotGothic16, monospace';
  ctx.textAlign = 'center';
  const signY = MACHINE_AREA_TOP - 35;
  ctx.fillStyle = 'rgba(255,20,147,0.8)';
  ctx.fillRect(W/2 - 70, signY - 2, 140, 18);
  ctx.fillStyle = '#fff';
  ctx.fillText('パ◯ンコ 中央店', W/2, signY + 12);
}

function drawMachines() {
  machines.forEach((m, i) => {
    m.frameTimer++;
    if (m.bigWin) {
      if (m.frameTimer >= 8) { m.frame = (m.frame + 1) % 2; m.frameTimer = 0; }
      drawSprite(SPRITES.machineBigWin, m.frame, m.x, m.y, MACHINE_W + 12, MACHINE_H);
    } else {
      if (m.frameTimer >= 20) { m.frame = (m.frame + 1) % 2; m.frameTimer = 0; }
      drawSprite(SPRITES.machineNormal, m.frame, m.x, m.y, MACHINE_W + 12, MACHINE_H);
    }
  });
}

// ============================================================
// FLOOR BALLS
// ============================================================
function spawnBalls() {
  ballSpawnTimer++;
  if (ballSpawnTimer >= 90) {
    ballSpawnTimer = 0;
    if (balls.length < 12) {
      const lane = Math.floor(Math.random() * NUM_LANES);
      const bx = LANE_CENTERS[lane] - 8 + (Math.random() - 0.5) * 20;
      const by = FLOOR_TOP + 20 + Math.random() * (PLAY_BOTTOM - FLOOR_TOP - 60);
      balls.push({x: bx, y: by, frame: 0, frameTimer: 0});
    }
  }
}

function drawBalls() {
  balls.forEach(b => {
    b.frameTimer++;
    if (b.frameTimer >= 15) { b.frame = (b.frame + 1) % 5; b.frameTimer = 0; }
    drawSprite(SPRITES.ball, b.frame, b.x, b.y, 18, 18);
  });
}

function checkBallPickup() {
  const hw = hero.x, hy = hero.y;
  balls = balls.filter(b => {
    const dist = Math.hypot(b.x - hw, b.y - hy);
    if (dist < 28) {
      hero.balls = Math.min(hero.balls + 1, 50);
      spawnPickupEffect(b.x, b.y);
      return false;
    }
    return true;
  });
}

// ============================================================
// HERO
// ============================================================
function updateHero() {
  hero.moving = false;
  moveTimer++;

  let targetX = LANE_CENTERS[hero.lane];
  let targetY = hero.y;

  // Snap X to lane
  if (Math.abs(hero.x - targetX) > 2) {
    hero.x += (targetX - hero.x) * 0.2;
    hero.moving = true;
  } else {
    hero.x = targetX;
  }

  if (moveTimer >= MOVE_DELAY) {
    moveTimer = 0;

    if (keys.left && hero.lane > 0) {
      hero.lane--;
      hero.moving = true;
      hero.facing = 'front';
    }
    if (keys.right && hero.lane < NUM_LANES - 1) {
      hero.lane++;
      hero.moving = true;
      hero.facing = 'front';
    }
    if (keys.up) {
      hero.y = Math.max(FLOOR_TOP + 10, hero.y - 30);
      hero.moving = true;
      hero.facing = 'back';
    }
    if (keys.down) {
      hero.y = Math.min(PLAY_BOTTOM - HERO_H - 80, hero.y + 30);
      hero.moving = true;
      hero.facing = 'front';
    }
  }

  // Update animation frame
  hero.frameTimer++;
  if (hero.moving) {
    if (hero.frameTimer >= 8) { hero.frame = (hero.frame + 1) % 6; hero.frameTimer = 0; }
  } else {
    hero.frame = 0;
  }

  // Check if near machine
  hero.atMachine = false;
  hero.targetMachine = -1;
  machines.forEach((m, i) => {
    const mx = LANE_CENTERS[i];
    if (Math.abs(hero.x - mx) < 20 && hero.y < FLOOR_TOP + 30) {
      hero.atMachine = true;
      hero.targetMachine = i;
    }
  });
}

function drawHero() {
  const frames = hero.facing === 'back' ? SPRITES.heroWalkBack : SPRITES.heroWalkFront;
  drawSprite(frames, hero.frame, hero.x - HERO_W/2, hero.y - HERO_H, HERO_W, HERO_H);

  // Indicator when at machine
  if (hero.atMachine && hero.balls > 0) {
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 9px DotGothic16, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('▼ PLAY', hero.x, hero.y - HERO_H - 8);
  }
}

// ============================================================
// SLOT MACHINE LOGIC
// ============================================================
function trySlot() {
  if (!hero.atMachine || hero.balls <= 0 || hero.targetMachine < 0) return;
  if (machines[hero.targetMachine].bigWin) return;
  slotActive = true;
}

function updateSlot() {
  if (!slotActive) return;
  if (!hero.atMachine || hero.balls <= 0) {
    slotActive = false;
    return;
  }

  slotTimer++;
  if (slotTimer >= slotInterval) {
    slotTimer = 0;
    if (hero.balls > 0) {
      hero.balls--;
      // Check for big win
      const chance = difficulty === 'high' ? 60 : 199;
      if (Math.random() < 1/chance) {
        triggerBigWin(hero.targetMachine);
      }
    }
    if (hero.balls <= 0) slotActive = false;
  }
}

function triggerBigWin(machineIdx) {
  machines[machineIdx].bigWin = true;
  bigWinCount++;
  slotActive = false;
  spawnBigWinEffect(LANE_CENTERS[machineIdx], MACHINE_AREA_TOP + MACHINE_H/2);
  // Add bonus balls
  hero.balls = Math.min(hero.balls + 15, 50);

  if (bigWinCount === 5) {
    // True end path
    setTimeout(() => showTrueEnd(), 800);
  }
}

// ============================================================
// CLERKS (ENEMIES)
// ============================================================
function spawnClerk() {
  clerkSpawnTimer++;
  if (clerkSpawnTimer >= clerkSpawnInterval) {
    clerkSpawnTimer = 0;
    const fromLeft = Math.random() < 0.5;
    const y = FLOOR_TOP + 20 + Math.random() * (PLAY_BOTTOM - FLOOR_TOP - 80);
    const speed = CLERK_BASE_SPEED + Math.random() * 0.8;
    clerks.push({
      x: fromLeft ? -CLERK_W : W + CLERK_W,
      y: y,
      speed: fromLeft ? speed : -speed,
      fromLeft: fromLeft,
      frame: 0,
      frameTimer: 0,
      angry: false,
      angryTimer: 0,
    });
    clerkSpawnInterval = 200 + Math.floor(Math.random() * 200);
  }
}

function updateClerks() {
  clerks = clerks.filter(c => {
    c.x += c.speed;
    c.frameTimer++;
    if (c.frameTimer >= 8) { c.frame = (c.frame + 1) % 6; c.frameTimer = 0; }

    // Check collision with hero
    const dx = Math.abs(c.x - hero.x);
    const dy = Math.abs(c.y - hero.y);
    if (dx < 30 && dy < 40) {
      // Collision!
      triggerGameOver();
      return false;
    }

    // Remove if off screen
    if (c.x < -CLERK_W * 2 || c.x > W + CLERK_W * 2) return false;
    return true;
  });
}

function drawClerks() {
  clerks.forEach(c => {
    drawSprite(SPRITES.clerkWalk, c.frame, c.x - CLERK_W/2, c.y - CLERK_H, CLERK_W, CLERK_H, c.speed > 0);
  });
}

function triggerGameOver() {
  gameState = 'gameover';
  slotActive = false;
  showScreen('screenGameOver');
  renderGameOverScreen();
}

// ============================================================
// TIMER
// ============================================================
function updateTimer() {
  if (gameState !== 'playing') return;
  gameTimer--;
  if (gameTimer <= 0) {
    triggerTimeUp();
  }
}

function triggerTimeUp() {
  slotActive = false;
  gameState = 'timeup';
  if (bigWinCount === 0) {
    showScreen('screenGameOver');
    renderGameOverScreen();
  } else if (bigWinCount < 5) {
    showScreen('screenClear');
    renderClearScreen(bigWinCount);
  } else {
    showTrueEnd();
  }
}

function getTimeString() {
  const elapsed = TOTAL_FRAMES - gameTimer;
  const totalSecs = Math.floor(elapsed / 60);
  const h = START_TIME_H + Math.floor((START_TIME_M * 60 + totalSecs) / 3600);
  const m = Math.floor(((START_TIME_M * 60 + totalSecs) % 3600) / 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ============================================================
// PARTICLES
// ============================================================
function spawnPickupEffect(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*3, vy: -Math.random()*3,
      life: 30, maxLife: 30, color: '#aaaaff', type: 'dot', size: 4,
    });
  }
}

function spawnBigWinEffect(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 60, maxLife: 60,
      color: ['#ffd700','#ff69b4','#00ffff','#ff4500'][Math.floor(Math.random()*4)],
      type: 'star', size: 6 + Math.random() * 6,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life--;
    return p.life > 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    if (p.type === 'star') {
      ctx.font = `${p.size}px serif`;
      ctx.fillText('★', p.x, p.y);
    } else {
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  });
}

// ============================================================
// INPUT HANDLING
// ============================================================
function setupControls() {
const btnMap = {
btnUp: ‘up’, btnDown: ‘down’, btnLeft: ‘left’, btnRight: ‘right’,
};
Object.entries(btnMap).forEach(([id, key]) => {
const el = document.getElementById(id);
if (!el) return;
el.addEventListener(‘touchstart’, e => { e.preventDefault(); keys[key] = true; }, {passive:false});
el.addEventListener(‘touchend’, e => { e.preventDefault(); keys[key] = false; }, {passive:false});
el.addEventListener(‘mousedown’, e => { keys[key] = true; });
el.addEventListener(‘mouseup’, e => { keys[key] = false; });
});

const actionBtn = document.getElementById(‘btnAction’);
if (actionBtn) {
actionBtn.addEventListener(‘touchstart’, e => { e.preventDefault(); trySlot(); }, {passive:false});
actionBtn.addEventListener(‘mousedown’, () => trySlot());
}

// Keyboard
document.addEventListener(‘keydown’, e => {
if (e.key === ‘ArrowLeft’) keys.left = true;
if (e.key === ‘ArrowRight’) keys.right = true;
if (e.key === ‘ArrowUp’) keys.up = true;
if (e.key === ‘ArrowDown’) keys.down = true;
if (e.key === ’ ’ || e.key === ‘z’ || e.key === ‘Z’) trySlot();
});
document.addEventListener(‘keyup’, e => {
if (e.key === ‘ArrowLeft’) keys.left = false;
if (e.key === ‘ArrowRight’) keys.right = false;
if (e.key === ‘ArrowUp’) keys.up = false;
if (e.key === ‘ArrowDown’) keys.down = false;
});
}

frameCount++;

if (gameState === ‘playing’) {
// Update
updateTimer();
updateHero();
checkBallPickup();
spawnBalls();
spawnClerk();
updateClerks();
updateSlot();
updateParticles();

// Draw
ctx.clearRect(0, 0, W, H);
if (gameState === ‘playing’) {
drawBackground();
drawMachines();
drawBalls();

// ============================================================
// END GAME CHECKS
// ============================================================
function checkEndCondition() {
if (bigWinCount === 0) {
triggerGameOver();
} else if (bigWinCount < 5) {
gameState = ‘clear’;
showScreen(‘screenClear’);
renderClearScreen(bigWinCount);
}
}

// ============================================================
// INIT
// ============================================================
function startInit() {
setupControls();
showScreen(‘screenTitle’);
renderTitleScreen();
gameLoop();
}

window.addEventListener(‘load’, () => {
if (spriteSheet.complete && spriteSheet.naturalWidth > 0) {
startInit();
} else {
spriteSheet.onload = startInit;
spriteSheet.onerror = startInit;
}
});

// Expose to inline onclick
window.startGame = startGame;
window.showInstructions = showInstructions;
window.goToTitle = goToTitle;
window.galChoose = galChoose;
